openapi: 3.1.0
info:
  title: DocsMCP API
  description: Crawls documentation URLs, embeds them into Qdrant, and exposes MCP endpoints for AI assistants.
  version: 1.1.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: auth
    description: User registration
  - name: crawl
    description: Crawl job submission and status
  - name: mcp
    description: MCP JSON-RPC endpoint for AI tool use

paths:
  /health:
    get:
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /v1/register:
    post:
      tags: [auth]
      summary: Register a new user
      description: |
        Creates a user account and returns a platform API key.
        The key is shown **once** — it is never stored in plaintext and cannot be recovered.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: you@example.com
      responses:
        "200":
          description: User created — save the api_key immediately
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/crawl:
    post:
      tags: [crawl]
      summary: Submit a crawl job
      description: |
        Enqueues a crawl job for the given URL.
        - **Cache hit** (URL already crawled): returns `200` with `status: ready`, a fresh `mcp_api_key`,
          and a `claude_md` snippet ready to paste into your project's CLAUDE.md.
        - **Cache miss**: creates a new crawl job, returns `202` with `status: queued`.

        The `mcp_api_key` is shown **once** — save it to authenticate MCP calls.
        Poll `GET /v1/crawl/{id}` until `status` is `ready`, then use the `mcp_endpoint`.
      operationId: postCrawl
      security:
        - PlatformKeyHeader: []
        - PlatformKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  example: https://docs.pydantic.dev/latest/
      responses:
        "200":
          description: Cache hit — crawl already ready, includes `claude_md` snippet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlResponse"
        "202":
          description: Accepted — crawl job enqueued, poll GET /v1/crawl/{id} for status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/crawl/{id}:
    get:
      tags: [crawl]
      summary: Get crawl status
      description: Poll until `status` is `ready` or `failed`. Returns `mcp_endpoint` for convenience.
      operationId: getCrawlStatus
      security:
        - PlatformKeyHeader: []
        - PlatformKeyBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        "200":
          description: Crawl record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/crawls:
    get:
      tags: [crawl]
      summary: List all crawls for the authenticated user
      description: |
        Returns up to 50 crawls belonging to the authenticated user, newest first.
        Useful for discovering which documentation collections are available
        before configuring an MCP session.
      operationId: listCrawls
      security:
        - PlatformKeyHeader: []
        - PlatformKeyBearer: []
      responses:
        "200":
          description: Array of crawl records (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrawlListEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/mcp/{crawl_id}:
    post:
      tags: [mcp]
      summary: MCP JSON-RPC endpoint
      description: |
        JSON-RPC 2.0 endpoint. Authenticate with the `mcp_api_key` returned by `POST /v1/crawl`.

        Supports two calling styles:
        - **MCP protocol** (`tools/call`): wraps results in `{content:[{type:"text",text:"..."}]}` — used by Claude Code and Cursor.
        - **Legacy direct methods**: call the method name directly for simpler curl testing.

        **Available tools:**
        | Tool | Description |
        |------|-------------|
        | `search_docs` | Hybrid semantic search (dense + sparse RRF) over crawled docs |
        | `get_page` | Retrieve all chunks for a specific page URL |
        | `add_page` | Fetch, chunk, embed, and add a new page to the collection |
        | `create_crawl` | Start a new collection for a different URL; returns new `mcp_endpoint` + `mcp_api_key` |
        | `list_crawls` | List all indexed collections for this account |
        | `get_status` | Poll status of any crawl — use after `create_crawl` returns `queued` |

        **MCP protocol methods also supported:** `initialize`, `notifications/initialized`, `tools/list`
      operationId: mcpHandle
      security:
        - MCPKeyBearer: []
        - MCPKeyHeader: []
      parameters:
        - name: crawl_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RPCRequest"
            examples:
              tools_call_search:
                summary: MCP tools/call — search_docs
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: tools/call
                  params:
                    name: search_docs
                    arguments:
                      query: "how to define validators"
                      top_k: 5
              tools_call_list_crawls:
                summary: MCP tools/call — list_crawls
                value:
                  jsonrpc: "2.0"
                  id: 2
                  method: tools/call
                  params:
                    name: list_crawls
                    arguments: {}
              tools_call_get_status:
                summary: MCP tools/call — get_status
                value:
                  jsonrpc: "2.0"
                  id: 3
                  method: tools/call
                  params:
                    name: get_status
                    arguments:
                      crawl_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              tools_call_create_crawl:
                summary: MCP tools/call — create_crawl
                value:
                  jsonrpc: "2.0"
                  id: 4
                  method: tools/call
                  params:
                    name: create_crawl
                    arguments:
                      url: "https://docs.pydantic.dev/latest/"
              tools_call_get_page:
                summary: MCP tools/call — get_page
                value:
                  jsonrpc: "2.0"
                  id: 5
                  method: tools/call
                  params:
                    name: get_page
                    arguments:
                      url: "https://docs.pydantic.dev/latest/concepts/validators/"
              tools_call_add_page:
                summary: MCP tools/call — add_page
                value:
                  jsonrpc: "2.0"
                  id: 6
                  method: tools/call
                  params:
                    name: add_page
                    arguments:
                      url: "https://docs.pydantic.dev/latest/concepts/types/"
              legacy_search:
                summary: Legacy direct — search_docs
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: search_docs
                  params:
                    query: "how to define validators"
                    top_k: 5
      responses:
        "200":
          description: JSON-RPC response (errors are in the response body, not HTTP status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RPCResponse"
              examples:
                tools_call_result:
                  summary: tools/call result envelope
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result:
                      content:
                        - type: text
                          text: "[{\"text\":\"Validators are...\",\"page_url\":\"https://...\",\"score\":0.91}]"
                method_not_found:
                  summary: Method not found error
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    error:
                      code: -32601
                      message: "method not found"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    PlatformKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: Platform API key from POST /v1/register
    PlatformKeyBearer:
      type: http
      scheme: bearer
      description: Platform API key as Bearer token
    MCPKeyBearer:
      type: http
      scheme: bearer
      description: MCP API key from POST /v1/crawl
    MCPKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: MCP API key from POST /v1/crawl

  schemas:
    RegisterResponse:
      type: object
      properties:
        email:
          type: string
          example: you@example.com
        api_key:
          type: string
          description: Platform API key — shown once, save immediately
          example: a3f1c2d4e5b6...

    CrawlResponse:
      type: object
      properties:
        crawl_id:
          type: string
          format: uuid
        mcp_endpoint:
          type: string
          format: uri
          example: http://localhost:8080/v1/mcp/3fa85f64-5717-4562-b3fc-2c963f66afa6
        mcp_api_key:
          type: string
          description: MCP API key — shown once, save immediately
          example: b7e2f1a3c4d5...
        status:
          $ref: "#/components/schemas/CrawlStatusEnum"
        claude_md:
          type: string
          description: |
            Ready-to-paste CLAUDE.md snippet. Only present when `status == "ready"` and page_count > 0.
            Contains endpoint, key, source URL, page/chunk counts, and the rule for the agent to call search_docs first.
          example: |
            ## DocsMCP — docs.pydantic.dev
            Endpoint: http://localhost:8080/v1/mcp/3fa85f64-5717-4562-b3fc-2c963f66afa6
            Key: b7e2f1a3c4d5...
            Source: https://docs.pydantic.dev/latest/ (142 pages · 1847 chunks · 2026-06-22)
            Rule: Always call search_docs before answering questions about this library. Use list_crawls to see all indexed collections.

    CrawlStatusResponse:
      type: object
      properties:
        crawl_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/CrawlStatusEnum"
        page_count:
          type: integer
          example: 142
        chunk_count:
          type: integer
          example: 1847
        mcp_endpoint:
          type: string
          format: uri
          example: http://localhost:8080/v1/mcp/3fa85f64-5717-4562-b3fc-2c963f66afa6

    CrawlListEntry:
      type: object
      properties:
        crawl_id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
          example: https://docs.pydantic.dev/latest/
        status:
          $ref: "#/components/schemas/CrawlStatusEnum"
        page_count:
          type: integer
          example: 142
        chunk_count:
          type: integer
          example: 1847
        crawled_at:
          type: string
          format: date
          example: "2026-06-22"
        mcp_endpoint:
          type: string
          format: uri
          example: http://localhost:8080/v1/mcp/3fa85f64-5717-4562-b3fc-2c963f66afa6

    CrawlStatusEnum:
      type: string
      enum: [queued, crawling, chunking, embedding, ready, failed]
      example: ready

    RPCRequest:
      type: object
      required: [jsonrpc, method, id]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
            - type: string
          example: 1
        method:
          type: string
          enum:
            - tools/call
            - tools/list
            - initialize
            - notifications/initialized
            - search_docs
            - get_page
            - add_page
            - create_crawl
            - list_crawls
            - get_status
        params:
          description: Shape depends on method — see examples above

    SearchDocsParams:
      type: object
      required: [query]
      properties:
        query:
          type: string
          example: how to define validators
        top_k:
          type: integer
          default: 5
          example: 5

    GetPageParams:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://docs.pydantic.dev/latest/concepts/validators/

    AddPageParams:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://docs.pydantic.dev/latest/concepts/types/

    CreateCrawlParams:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Root URL of the documentation to crawl
          example: https://docs.pydantic.dev/latest/

    GetStatusParams:
      type: object
      properties:
        crawl_id:
          type: string
          format: uuid
          description: Crawl ID to check. Omit to check the current session's crawl.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    CreateCrawlResult:
      type: object
      properties:
        crawl_id:
          type: string
          format: uuid
        mcp_endpoint:
          type: string
          format: uri
        mcp_api_key:
          type: string
          description: New MCP API key — shown once, save it
        status:
          $ref: "#/components/schemas/CrawlStatusEnum"

    SearchResult:
      type: object
      properties:
        text:
          type: string
        page_url:
          type: string
          format: uri
        page_title:
          type: string
        heading_path:
          type: string
          example: "Validators > Field validators"
        score:
          type: number
          format: float
          example: 0.91

    RPCResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
            - type: string
        result:
          description: |
            Present on success. Shape depends on method:
            - `tools/call`: `{content:[{type:"text",text:"<json-encoded result>"}]}`
            - Legacy direct methods: raw result object or array
        error:
          $ref: "#/components/schemas/RPCError"

    RPCError:
      type: object
      properties:
        code:
          type: integer
          example: -32601
        message:
          type: string
          example: method not found

    Error:
      type: object
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Key: 'email' Error:Field validation for 'email' failed on the 'required' tag"
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "unauthorized"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "not found"
    InternalError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "db error"
