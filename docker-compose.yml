services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: docsmcp
      POSTGRES_PASSWORD: docsmcp
      POSTGRES_DB: docsmcp
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis:6379        # override localhost → Docker service name
    depends_on:
      - redis
    restart: unless-stopped
    # port 8080 not exposed — only nginx talks to app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  qdrant_data:
