services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: docsmcp
      POSTGRES_PASSWORD: docsmcp
      POSTGRES_DB: docsmcp
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
